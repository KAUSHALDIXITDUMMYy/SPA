# /etc/nginx/sites-available/spa-api
# New host (38.248.12.6): proxies public HTTP :80 /api/* -> Next.js on 127.0.0.1:3000.
# Coexists with RustDesk (ports 21113-21119) — no overlap.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 38.248.12.6 _;

    client_max_body_size 10M;

    location /api/ {
        if ($http_origin ~* intelsnipers\.com) {
            return 403;
        }
        if ($http_referer ~* intelsnipers\.com) {
            return 403;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }
}
