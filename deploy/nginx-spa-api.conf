# /etc/nginx/sites-available/spa-api
# Proxies public HTTP :80 /api/* → Next.js on :3000 (Vercel frontend rewrites here)

server {
    listen 80;
    listen [::]:80;
    server_name 217.216.87.128;

    client_max_body_size 10M;

    location /api/ {
        # Block known clone domains (e.g. intelsnipers.com / CourtSide)
        if ($http_origin ~* intelsnipers\.com) {
            return 403;
        }
        if ($http_referer ~* intelsnipers\.com) {
            return 403;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }
}
